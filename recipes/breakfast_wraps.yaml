---
title: Breakfast Wraps
category: Breakfast
servings: 10
ingredients:
  - Large white tortillas 10 units, 10 inch
  - Eggs 12 units
  - Bell peppers, chopped, to taste
  - Onion, chopped, to taste
  - Mushrooms, chopped, to taste
  - Bacon 10 slices, cooked
  - Frozen hash brown patties 10 units, cooked according to package instructions
instructions:
  - Scramble the eggs with the chopped peppers, onion, and mushrooms.
  - Cook the bacon and the hash brown patties (per package instructions), if not already done.
  - Assemble each wrap with a portion of the veggie scrambled eggs, 1 hash brown patty, and 1 slice of bacon.
  - Roll each tortilla into a wrap and wrap individually in parchment paper.
  - Place the wrapped burritos into a ziploc bag and freeze.
