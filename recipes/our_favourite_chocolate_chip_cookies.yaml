---
title: Our Favourite Chocolate Chip Cookies
category: dessert
prep time: 20
cook time: 11
servings: 30
ingredients:
  - salted butter 2 sticks softened
  - granulated sugar 0.5 cups
  - dark brown sugar 1 cup packed
  - light brown sugar 0.5 cups packed
  - eggs 2 large room temp.
  - vanilla extract 2 tsp
  - all purpose flour 2.75 cups
  - coarse sea salt 0.25 tsp
  - baking soda 1 tsp
  - baking powder 1.5 tsp
  - chocolate chunks 2.25 cups
 instructions
  - Preheat oven to 360 F.
  - Cream butter, sugar, and brown sugar until the mixture is nice and fluffy (approximately 3 mins on medium-high speed.  This seems like forever so watch the clock.)
  - Add both eggs and the vanilla and beat for an additional 2 minutes.
  - Add the baking soda, baking powder, a bit of salt, and flour until cookie batter is fully incorporated.  Finally, add chocolate pieces and mix until well distributed.
  - Chill dough for 24-48 hours if you want them to be the best cookies ever.
  - The cookie batter will be somewhat thick and quite sticky, so use your hands to plop balls of dough onto a baking sheet lined with parchement paper.  I prefer dough balls slightly larger than a quarter (8 per sheet).
  - Sprinkle some sea salt over them before they go in the oven.
  - Bake for 10-11 minutes, until the edges are golden brown but the centre is still light and puffy.
  - Remove from heat slam down, (hard, like SLAM them) to flatten out a bit.
  - Transfer cookies to a room temperature, non-porous surface to cool for at least 3-5 mins before serving.
  - You can reuse the parchment paper - just brush off the excess salt.