---
title: Hot Honey Crispy Salmon Bowls
category: main
prep time: 15
cook time: 15
servings: 4
source: https://www.halfbakedharvest.com/hot-honey-crispy-salmon-bowls/#wprm-recipe-container-143912
ingredients:
  Main Ingredients:
    - salmon fillets 4 (4-6 oz) cut into bite-sized chunks
    - olive oil 6 tbsp
    - smoked paprika 1 tsp
    - salt
    - black pepper
    - asparagus 1 bunch ends trimmed
    - honey 0.5 cups
    - hot sauce 2-3 tbsp
    - cayenne pepper 1-3 tsp
    - chipotle chili powder 0.75 tsp
    - garlic powder 0.5 tsp
    - onion powder 0.5 tsp
    - cooked rice 3-4 cups
    - creamy ranch
  Avocado Salsa:
    - avocados 2 diced
    - jalapeno pepper 1 sliced
    - cilantro 0.5 cups chopped
    - dill 2 tbsp chopped
    - feta cheese 0.5 cups crumbled
    - olive oil 2 tbsp
    - lemon juice 1 tbsp
    - toasted seeds 0.33 cups (eg. pumpkin, sesame, sunflower, etc.)
instructions:
  - Preheat oven to 450 F.
  - On a baking sheet, toss the salmon pieces with 3 tbsp olive oil, paprika, salt, and pepper.  Arrange in a single layer.  On the other side of the pan, add the asparagus.  Toss with 1 tbsp olive oil, salt, and pepper.  Roast 10-15 minutes or until the salmon is just undercooked to your liking.
  - Meanwhile, make the hot honey.  In a sauce pot, warm together the honey, hot sauce, cayenne, chili powder, onion powder, and garlic powder, plus a pinch of salt.
  - Spoon some of the hot honey over the salmon.  Switch the oven to broil adn broil until lightly charred and crispy.  Spoon over additional hot honey, to your taste.
  - To make the salsa, combine all ingredients in a bowl and season with salt, gently tossing.
  - Arrange the salmon and asparagus over bowls of rice.  Top with salsa.  Add ranch on the side or drizzle over each bowl.  Enjoy!