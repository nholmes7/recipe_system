---
title: Spicy Salmon Bowls
category: main
prep time: 20
cook time: 40
servings: 4
source: https://www.delish.com/cooking/recipe-ideas/a26950912/easy-spicy-salmon-bowls-recipe/?utm_source=google&utm_medium=cpc&utm_campaign=mgu_ga_del_md_pmx_prog_org_ca_18639947754&gad_source=1&gad_campaignid=18639961644&gbraid=0AAAAACq-IPxGOu48SCd4EhlIqTbgHXE43&gclid=CjwKCAjwhe3OBhABEiwA6392zChgeK18a93909S3DQ65V5uRk0r3YOYMRIg7CSOdQ099bTU9FwfSXBoCRikQAvD_BwE#
ingredients:
  Salmon:
    - garlic 4 cloves minced
    - olive oil 0.33 cups
    - soy sauce 0.33 cups
    - chili garlic sauce 0.25 cups
    - lime juice 1 lime
    - honey 2 tbsp
    - salmon fillets 4 (4-oz.)
  Quick Pickled Cucumbers:
    - rice vinegar or rice wine vinegar 0.5 cups
    - granulated sugar 1 tbsp
    - salt 1 tsp
    - toasted sesame oil 2 tsp
    - persian cucumbers 3 thinly sliced
  Spicy Mayo:
    - mayonnaise 0.5 cups
    - sriracha 2 tbsp
    - toasted sesame oil 2 tsp
  Bowls:
    - cooked brown rice 4 cups
    - avocado 1 thinly sliced
    - carrot 1 medium finely grated
    - red onion 0.5 thinly sliced
    - cilantro leaves
    - sesame seeds
instructions:
  Salmon:
    - Arrange a rack in centre of the oven, preheat to 350 F.
    - Line a large baking sheet with foil.
    - In a medium bowl, whisk garlic, soy sauce, olive oil, chili garlic sauce, lime juice, honey, and garlic.  Add salmon and gently toss to combine.  Place on the foil lined baking sheet.
    - Bake salmon until fork-tender, 20 to 25 minutes.
  Quick Pickled Cucumbers:
    - In a medium heatproof bowl or jar, microwave vinegar, sugar, and salt until sugar and salt are dissolved, about 2 minutes.
    - Stir in sesame oil, then add cucumbers and shake to combine.  Cover with a tight-fitting lid or plastic wrap and let sit at room temperature until ready to use.
  Spicy Mayo:
    - In a small bowl, combine mayonnaise, sriracha, and sesame oil.
  Bowls:
    - Divide rice among bowls.
    - Top with salmon, pickled cucumbers, avocado, carrot, onion, cilantro, and sesame seeds.
    - Drizzle with spicy mayo.