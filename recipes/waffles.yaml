---
title: waffles
category: breakfast
prep time: 10
cook time: 10
servings: 4
ingredients:
  - all purpose flour 2 cups
  - baking powder 2 tsp
  - sea salt 0.5 tsp
  - eggs 2 large at room temp
  - milk 1.25 cups
  - unsalted butter 0.5 cups
  - granulated sugar 2 tbsp
  - vanilla extract 1 tsp
  - maple syrup
instructions:
  - Preheat a waffle iron.  Grease lightly with melted butter.
  - In a large bowl, whisk together the flour, baking powder, and salt.
  - In a medium bowl, beat the eggs, then add the milk, melted butter, sugar, and vanilla and whisk until well combined.
  - Add the wet ingredients to the dry ingredients and mix until just combined.  A few lumps are okay.
  - Scoop 0.5 cups of batter for each waffle into a waffle maker.  cook for 4 minutes.
  - Serve with more butter and maple syrup.