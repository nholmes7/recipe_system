---
title: Shepherd's Pie by Isabelle
category: Meal
servings: 6
source: Isabelle Côté
ingredients:
  Beef Filling:
    - Ground beef 1.5 lb
    - Onion 1 unit, diced
    - Garlic 3 cloves, minced
    - Water 0.5 cup, or stock or wine, for deglazing, plus more as needed
    - Bouillon paste 1 cube
    - Worcestershire sauce 2 tbsp, or to taste
    - Dijon mustard 1 tbsp
    - Thyme, dried or fresh, to taste
    - Rosemary, dried or fresh, to taste
    - Salt and pepper, to taste
    - Cornstarch, mixed water to make a slurry
    - Corn 1 cup
    - Peas 1 cup
  Mashed Potato Topping:
    - Potatoes 2 lb, peeled and cubed
    - Butter 2 tbsp
    - Milk 0.25 cup
    - Salt, to taste
instructions:
  - Preheat the oven to 375°F (190°C).
  - Make the mashed potato topping.  Boil the potatoes until fork-tender, then drain and mash with the butter and milk. Season with salt to taste.
  - Cook the ground beef in a large oven-safe skillet or pot over medium heat until fully cooked, breaking it apart as it browns. Remove excess fat, adding a little back in later if the pan looks dry.
  - Turn the heat up to medium-high and continue browning the beef further until you get some crispy bits and good browning.
  - Add the onion and sauté until softened, then add the garlic and cook until fragrant.
  - Deglaze the pan with the water (or stock or wine), scraping up the browned bits from the bottom. Add a bit more water along with the bouillon paste or cube.
  - Stir in the Worcestershire sauce and Dijon mustard, then add the thyme and rosemary and season with salt and pepper. Taste and keep adjusting until the flavor is where you want it.
  - While there's still some liquid in the pan, stir in the cornstarch slurry and cook down until the gravy reaches the consistency you want, adding a splash more water if it needs thinning.
  - Stir in the corn and peas.
  - Transfer the beef mixture to a baking dish and spread the mashed potatoes on top. Bake for 15-20 minutes until heated through, then broil for a few minutes to brown the top, if desired.
