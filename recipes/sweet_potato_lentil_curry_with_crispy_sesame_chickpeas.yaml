---
title: Sweet Potato Lentil Curry With Crispy Sesame Chickpeas
category: Dinner
prep time: 10 mins
cook time: 25 mins
servings: 6
source: https://www.halfbakedharvest.com/sweet-potato-lentil-curry/
ingredients:
  Curry:
    - Extra virgin olive oil 2 tbsp
    - Shallots 2 units, finely chopped
    - Ginger 1 inch, fresh, grated
    - Sweet potatoes 2 units, peeled and cubed
    - Thai red curry paste 3-4 tbsp, add more or less to taste
    - Vegetable broth 3-4 cups, low-sodium
    - Red lentils 0.75 cup, dried, can also use green lentils
    - Fish sauce 2 tbsp, or additional soy sauce
    - Soy sauce 1 tbsp, low sodium
    - Peanut butter 1 tbsp, rounded, creamy, or other nut butter
    - Coconut milk 14 oz, full fat, canned
    - Baby spinach 2 cups
    - Lime 1 unit, juiced
    - Cilantro 0.33 cup, fresh, chopped, plus more for serving
    - Basmati rice, cooked, for serving
    - Pomegranate arils, for serving, optional
  Chickpeas:
    - Sesame oil 2 tbsp, or extra virgin olive oil
    - Chickpeas 1 can, drained and patted dry
    - Soy sauce 2 tbsp, low sodium
    - Sesame seeds 1 tbsp, raw
instructions:
  - Heat the olive oil in a large pot over medium heat. When the oil shimmers, add the shallots and cook 3 minutes until soft. Add the ginger and sweet potatoes and cook until fragrant, about 2 minutes. Stir in the curry paste and cook another minute.
  - Add 3 cups of the broth, the lentils, fish sauce, soy sauce, and peanut butter. Bring to a boil over high heat, then reduce the heat to low. Cover and simmer 15-20 minutes, until the lentils are soft and the sweet potatoes are tender.
  - Meanwhile, make the chickpeas. Heat a large, high-sided skillet over medium heat. Add the sesame oil and chickpeas. Cook, stirring occasionally, until the chickpeas are crisped all over, about 5 minutes. Add the soy sauce and sesame seeds, tossing to combine. Cook 1 minute, then remove from the heat.
  - When the lentils are cooked, stir in the coconut milk, spinach, and lime juice, and cook 5 minutes. If the curry feels thick, add additional broth to thin. Remove from the heat and stir in the cilantro.
  - To serve, divide the rice among bowls and ladle the curry overtop. Top with the chickpeas, cilantro, and pomegranate arils. Enjoy!
